name: Redeploy on Railway

on:
  push:
    paths:
      - 'index.js'

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Redeploy
        run: |
          curl -X POST "https://api.railway.app/v1/deployments/${{ secrets.RAILWAY_DEPLOYMENT_ID }}/redeploy" \
          -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}"
